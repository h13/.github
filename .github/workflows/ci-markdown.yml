name: CI (Markdown)

on:
  workflow_call:
    inputs:
      glob:
        description: Glob pattern for Markdown files
        type: string
        default: "**/*.md"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: h13/.github/actions/apply-org-config@a256ea2f24f07e309b2cdfc41e15bd5381237cdd # main
        with:
          config-file: .markdownlint-cli2.yaml

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: lts/*

      - run: npx markdownlint-cli2 "${{ inputs.glob }}"
