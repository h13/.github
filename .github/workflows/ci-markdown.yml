name: CI (Markdown)

on:
  workflow_call:
    inputs:
      glob:
        description: Glob pattern for Markdown files
        type: string
        default: "**/*.md"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: h13/.github/actions/apply-org-config@c62d0eebefffc0d3ca156453f0fb7cd3dcb94f4c # main
        with:
          config-file: .markdownlint-cli2.yaml

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*

      - run: npx markdownlint-cli2 "${{ inputs.glob }}"
