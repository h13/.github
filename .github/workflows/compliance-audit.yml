name: Compliance Audit

on:
  schedule:
    - cron: "0 0 1 * *" # Monthly (1st day, 00:00 UTC)
  workflow_dispatch:

permissions:
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Audit all h13 repositories
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPOS=$(gh repo list h13 --no-archived --json name -q '.[].name' | grep -v '^\.github$')
          REPORT=""
          ISSUES_FOUND=0

          for repo in $REPOS; do
            FINDINGS=""

            # Check renovate.json (Renovate-only policy — no Dependabot)
            if ! gh api "repos/h13/$repo/contents/renovate.json" --silent 2>/dev/null; then
              FINDINGS="${FINDINGS}\n  - [ ] Missing \`renovate.json\`"
            fi

            # Check CI workflow
            if ! gh api "repos/h13/$repo/contents/.github/workflows" --silent 2>/dev/null; then
              FINDINGS="${FINDINGS}\n  - [ ] No CI workflows found"
            fi

            # Check branch protection on default branch
            DEFAULT_BRANCH=$(gh api "repos/h13/$repo" -q '.default_branch' 2>/dev/null || echo "main")
            if ! gh api "repos/h13/$repo/branches/$DEFAULT_BRANCH/protection" --silent 2>/dev/null; then
              FINDINGS="${FINDINGS}\n  - [ ] No branch protection on \`$DEFAULT_BRANCH\`"
            fi

            # Check LICENSE
            if ! gh api "repos/h13/$repo/contents/LICENSE" --silent 2>/dev/null; then
              FINDINGS="${FINDINGS}\n  - [ ] Missing \`LICENSE\`"
            fi

            # Check CODEOWNERS
            HAS_CODEOWNERS=false
            for path in "CODEOWNERS" ".github/CODEOWNERS" "docs/CODEOWNERS"; do
              if gh api "repos/h13/$repo/contents/$path" --silent 2>/dev/null; then
                HAS_CODEOWNERS=true
                break
              fi
            done
            if [ "$HAS_CODEOWNERS" = "false" ]; then
              FINDINGS="${FINDINGS}\n  - [ ] Missing \`CODEOWNERS\`"
            fi

            if [ -n "$FINDINGS" ]; then
              REPORT="${REPORT}\n### $repo\n$FINDINGS\n"
              ISSUES_FOUND=$((ISSUES_FOUND + 1))
            fi
          done

          if [ "$ISSUES_FOUND" -gt 0 ]; then
            BODY=$(printf "## Compliance Audit Report\n\n%d repo(s) with findings:\n%b\n\n---\n*Auto-generated by [compliance-audit](.github/workflows/compliance-audit.yml)*" "$ISSUES_FOUND" "$REPORT")

            # Close previous audit issues
            gh issue list --label "compliance-audit" --state open --json number -q '.[].number' | while read -r num; do
              gh issue close "$num" --comment "Superseded by new audit run."
            done

            gh issue create \
              --title "Compliance Audit: $ISSUES_FOUND repo(s) need attention" \
              --body "$BODY" \
              --label "compliance-audit"
          else
            echo "All repos compliant."
          fi

      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "compliance-audit" \
            --description "Auto-generated compliance audit findings" \
            --color "FBCA04" 2>/dev/null || true
