name: Compliance Audit

on:
  schedule:
    - cron: "0 0 1 * *" # Monthly (1st day, 00:00 UTC)
  workflow_dispatch:

permissions:
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Audit all h13 repositories
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Fetch all repos with default branch in one call
          REPO_DATA=$(gh repo list h13 --no-archived --limit 200 \
            --json name,defaultBranchRef \
            --jq '.[] | select(.name != ".github") | "\(.name)\t\(.defaultBranchRef.name)"')

          REPORT=""
          ISSUES_FOUND=0

          while IFS=$'\t' read -r repo branch; do
            FINDINGS=""

            # Fetch entire file tree in one API call (instead of per-file checks)
            TREE=$(gh api "repos/h13/$repo/git/trees/$branch?recursive=1" \
              -q '.tree[].path' 2>/dev/null || echo "")

            # Check renovate.json (Renovate-only policy — no Dependabot)
            if ! echo "$TREE" | grep -qx "renovate.json"; then
              FINDINGS="${FINDINGS}\n  - [ ] Missing \`renovate.json\`"
            fi

            # Check CI workflow
            if ! echo "$TREE" | grep -q "^\.github/workflows/"; then
              FINDINGS="${FINDINGS}\n  - [ ] No CI workflows found"
            fi

            # Check LICENSE
            if ! echo "$TREE" | grep -qx "LICENSE"; then
              FINDINGS="${FINDINGS}\n  - [ ] Missing \`LICENSE\`"
            fi

            # Check CODEOWNERS (any of the three standard locations)
            if ! echo "$TREE" | grep -qE "^(CODEOWNERS|\.github/CODEOWNERS|docs/CODEOWNERS)$"; then
              FINDINGS="${FINDINGS}\n  - [ ] Missing \`CODEOWNERS\`"
            fi

            # Branch protection requires a separate API call
            if ! gh api "repos/h13/$repo/branches/$branch/protection" --silent 2>/dev/null; then
              FINDINGS="${FINDINGS}\n  - [ ] No branch protection on \`$branch\`"
            fi

            if [ -n "$FINDINGS" ]; then
              REPORT="${REPORT}\n### $repo\n$FINDINGS\n"
              ISSUES_FOUND=$((ISSUES_FOUND + 1))
            fi
          done <<< "$REPO_DATA"

          if [ "$ISSUES_FOUND" -gt 0 ]; then
            BODY=$(printf "## Compliance Audit Report\n\n%d repo(s) with findings:\n%b\n\n---\n*Auto-generated by [compliance-audit](.github/workflows/compliance-audit.yml)*" "$ISSUES_FOUND" "$REPORT")

            # Close previous audit issues
            gh issue list --label "compliance-audit" --state open --json number -q '.[].number' | while read -r num; do
              gh issue close "$num" --comment "Superseded by new audit run."
            done

            gh issue create \
              --title "Compliance Audit: $ISSUES_FOUND repo(s) need attention" \
              --body "$BODY" \
              --label "compliance-audit"
          else
            echo "All repos compliant."
          fi

      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "compliance-audit" \
            --description "Auto-generated compliance audit findings" \
            --color "FBCA04" 2>/dev/null || true
